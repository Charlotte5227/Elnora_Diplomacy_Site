<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>外務システム端末</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 40px;
            font-size: 18px;
            line-height: 1.6;
            overflow-y: auto;
        }
        #terminal { text-shadow: 0 0 5px #0f0; }
        .text-line { margin-bottom: 10px; }
        .option-line { cursor: pointer; display: block; margin-bottom: 5px; }
        .option-line:hover { background-color: #0f0; color: #000; }
        .cursor { animation: blink 1s step-end infinite; }
        
        #input-container { display: none; margin-top: 15px; align-items: center; }
        .prompt-symbol { margin-right: 10px; }
        #user-input {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            outline: none;
            width: 80%;
            text-shadow: 0 0 5px #0f0;
        }
        
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="terminal"></div>
<div id="input-container">
    <span class="prompt-symbol">&gt;</span>
    <input type="text" id="user-input" autocomplete="off" placeholder="(入力待ち...　文章を入力してください)">
</div>

<script>
// ==========================================
// 【必須設定】ここだけ環境に合わせて変更してください
// ==========================================

// ① 読み込むシナリオデータのURL
// ※同じフォルダ内に data.json を置く場合は 'data.json' でOK
// ※GitHubから直接読み込む場合はRawデータのURLを指定（例: 'https://raw.githubusercontent.com/ユーザー名/リポジトリ名/main/data.json'）
const DATA_URL = 'data.json'; 

// ② BotサーバーのURL
// ※ローカルでテストする間は 'http://localhost:3000/api/send-message'
// ※公開した後は 'https://あなたのサーバーURL/api/send-message'
const BOT_API_URL = 'https://footnote-dreadlock-bogus.ngrok-free.dev/api/send-message'; 

// ③ Bot側のコードで設定した API_SECRET_KEY と「全く同じ合言葉」
const BOT_SECRET_KEY = 'Elnora_Secret_Key_2026'; 

// ==========================================

let scenarioData = {};
let currentSceneId = 'root';
let selectedDiscordOption = null;

const terminal = document.getElementById('terminal');
const inputContainer = document.getElementById('input-container');
const userInput = document.getElementById('user-input');

async function init() {
    try {
        const res = await fetch(DATA_URL);
        scenarioData = await res.json();
        renderScene(currentSceneId);
    } catch (e) {
        terminal.innerHTML = `<div class="text-line">システムエラー: データの読み込みに失敗しました。</div>`;
    }
}

async function renderScene(sceneId) {
    terminal.innerHTML = '';
    inputContainer.style.display = 'none';
    userInput.value = '';
    selectedDiscordOption = null;

    const scene = scenarioData[sceneId];
    if (!scene) return;

    const lines = scene.text.split('\n');
    for (const line of lines) {
        await typeText(`－ ${line}`);
    }

    if (scene.options && scene.options.length > 0) {
        let optionsHtml = '<div style="margin-top:20px;">－ ';
        scene.options.forEach((opt, index) => {
            optionsHtml += `<span class="option-line" onclick="handleOptionSelect(${index})">${opt.text}</span>`;
        });
        optionsHtml += '</div>';
        terminal.innerHTML += optionsHtml;
    }
}

function typeText(text) {
    return new Promise(resolve => {
        const div = document.createElement('div');
        div.className = 'text-line';
        terminal.appendChild(div);
        
        let i = 0;
        const interval = setInterval(() => {
            div.textContent = text.substring(0, i + 1) + (i < text.length - 1 ? '█' : '');
            i++;
            if (i === text.length) {
                clearInterval(interval);
                div.textContent = text;
                resolve();
            }
        }, 30);
    });
}

window.handleOptionSelect = function(optionIndex) {
    const scene = scenarioData[currentSceneId];
    const opt = scene.options[optionIndex];

    if (opt.requireInput) {
        inputContainer.style.display = 'flex';
        userInput.focus();
        selectedDiscordOption = opt;
    } else {
        currentSceneId = opt.next;
        renderScene(currentSceneId);
    }
};

// ▼▼▼ ここからコピーして差し替える ▼▼▼
userInput.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter' && userInput.value.trim() !== '') {
        const textToSend = userInput.value.trim();
        inputContainer.style.display = 'none';
        
        if (selectedDiscordOption && selectedDiscordOption.sendDiscord) {
            await typeText("－ 通信中...");
            try {
                const response = await fetch(BOT_API_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true' // ngrokのセキュリティブロックを突破する合言葉
                    },
                    body: JSON.stringify({
                        secretKey: BOT_SECRET_KEY,
                        messageContent: textToSend
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || "サーバーエラーが発生しました");
                }
            } catch (error) {
                // エラー時は画面を止めて、詳細を表示する
                await typeText("－ ❌ 致命的エラー: " + error.message);
                return; 
            }
        }
        
        // 通信が「成功」した場合のみ、次のシーンへ遷移する
        currentSceneId = selectedDiscordOption.next;
        renderScene(currentSceneId);
    }
});
// ▲▲▲ 差し替えここまで ▲▲▲

init();
</script>
</body>
</html>
